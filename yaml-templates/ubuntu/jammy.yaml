image:
  distribution: "ubuntu"
  release: "jammy"
  architecture: "amd64"
  description: "Ubuntu 22.04 Jammy (debthin.org Minimal)"

source:
  downloader: "debootstrap"
  url: "http://debthin.org/ubuntu"

files:
  # 1. Copy the debthin GPG key into the container
  - path: /etc/apt/keyrings/debthin.gpg
    generator: copy
    source: ./debthin-keyring-binary.gpg
    mode: 0644

  # 2. Configure apt to use debthin mirror with GPG key
  - path: /etc/apt/sources.list
    generator: dump
    content: |-
      deb [signed-by=/etc/apt/keyrings/debthin.gpg] http://debthin.org/ubuntu jammy main
      deb http://security.ubuntu.com/ubuntu jammy-security main

  # 3. Inject dpkg exclusions - apply to packages installed after debootstrap
  - path: /etc/dpkg/dpkg.cfg.d/01_nodoc
    generator: dump
    content: |-
      path-exclude /usr/share/doc/*
      path-include /usr/share/doc/*/copyright
      path-exclude /usr/share/man/*
      path-exclude /usr/share/groff/*
      path-exclude /usr/share/info/*
      path-exclude /usr/share/lintian/*

  - path: /etc/dpkg/dpkg.cfg.d/01_nolocale
    generator: dump
    content: |-
      path-exclude /usr/share/locale/*
      path-include /usr/share/locale/en/*

  - path: /etc/dpkg/dpkg.cfg.d/01_nobloat
    generator: dump
    content: |-
      path-exclude /usr/lib/x86_64-linux-gnu/gconv/*
      path-exclude /usr/lib/udev/hwdb.d/*
      path-exclude /usr/lib/systemd/hwdb/*
      path-exclude /etc/udev/hwdb.d/*

  # 4. apt config - no translations, compressed lists, no binary caches
  - path: /etc/apt/apt.conf.d/99thin
    generator: dump
    content: |-
      Acquire::Languages "none";
      Acquire::GzipIndexes "true";
      Acquire::CompressionTypes::Order:: "gz";
      Dir::Cache::pkgcache "";
      Dir::Cache::srcpkgcache "";

  - path: /etc/apt/apt.conf.d/01norecommends
    generator: dump
    content: |-
      APT::Install-Recommends "false";
      APT::Install-Suggests "false";

  # 5. Basic networkd DHCP config
  - path: /etc/systemd/network/10-eth0.network
    generator: dump
    content: |-
      [Match]
      Name=eth0
      [Network]
      DHCP=yes

  - path: /etc/hostname
    generator: hostname

  - path: /etc/hosts
    generator: hosts

  # 6. Zero-dependency DNS writer for networkd-only containers
  - path: /etc/systemd/system/thin-resolv.service
    generator: dump
    content: |-
      # Writes /etc/resolv.conf from networkd lease state.
      # Skips when systemd-resolved is installed (resolvectl present),
      # since resolved manages /etc/resolv.conf itself.
      [Unit]
      Description=Generate resolv.conf from networkd lease state
      After=systemd-networkd.service

      [Service]
      Type=oneshot
      ExecStart=/bin/sh -c "[ -x /usr/bin/resolvectl ] && exit 0; sed -n 's/^DNS=\\(.*\\)/\\1/p' /run/systemd/netif/state | tr ' ' '\\n' | sed '/^$/d; s/^/nameserver /' > /etc/resolv.conf"

  - path: /etc/systemd/system/thin-resolv.path
    generator: dump
    content: |-
      [Unit]
      Description=Watch networkd state for DNS changes

      [Path]
      PathChanged=/run/systemd/netif/state

      [Install]
      WantedBy=multi-user.target

packages:
  manager: apt
  update: false
  cleanup: false

actions:
  - trigger: post-unpack
    action: |-
      #!/bin/sh
      set -e
      # Purge doc/man/locale installed by debootstrap before any further packages land
      rm -rf /usr/share/doc/* /usr/share/man/* /usr/share/locale/*
      rm -rf /usr/lib/x86_64-linux-gnu/gconv/* /usr/lib/udev/hwdb.d/*
      rm -f /usr/lib/udev/hwdb.bin /etc/udev/hwdb.bin

  - trigger: post-files
    action: |-
      #!/bin/sh
      set -e

      [ -f /.post-files-done ] && exit 0

      export DEBIAN_FRONTEND=noninteractive

      echo ">>> Installing base packages"
      apt-get update
      # Remove ubuntu-minimal metapackage first to break dependency chains
      apt-get remove -y ubuntu-minimal 2>/dev/null || true
      apt-get install -y systemd systemd-sysv wget
      echo ">>> Removing bloat packages"
      apt-get remove -y udev netplan.io \
        locales debconf-i18n python3.10 \
        networkd-dispatcher ubuntu-advantage-tools \
        libicu70 iso-codes 2>/dev/null || true
      apt-get autoremove -y

      echo ">>> Cleaning docs, man pages, locale data"
      rm -rf /usr/share/doc/* /usr/share/man/* /usr/share/locale/*
      rm -f /var/cache/apt/*.bin
      rm -rf /var/lib/apt/lists/*

      echo ">>> Enabling systemd services"
      systemctl enable systemd-networkd.service
      systemctl enable systemd-networkd.socket
      systemctl enable thin-resolv.path

      echo ">>> Configuring journald limits"
      mkdir -p /etc/systemd/journald.conf.d
      printf '[Journal]\nSystemMaxUse=50M\nSystemKeepFree=0\n' \
             > /etc/systemd/journald.conf.d/00-container-limits.conf

      touch /.post-files-done

targets:
  lxc:
    config:
      - type: all
        content: |-
          lxc.include = LXC_TEMPLATE_CONFIG/ubuntu.common.conf
          lxc.arch = amd64
      - type: user
        content: |-
          lxc.include = LXC_TEMPLATE_CONFIG/ubuntu.userns.conf
