image:
  distribution: "debian"
  release: "bullseye"
  architecture: "amd64"
  description: "Debian Bullseye (debthin.org Minimal)"

source:
  downloader: "debootstrap"
  url: "http://debthin.org/debian"

files:
  # 1. Copy the debthin GPG key into the container
  - path: /etc/apt/keyrings/debthin.gpg
    generator: copy
    source: ./debthin-keyring-binary.gpg
    mode: 0644

  # 2. Configure apt to use debthin mirror with GPG key
  - path: /etc/apt/sources.list
    generator: dump
    content: |-
      deb [signed-by=/etc/apt/keyrings/debthin.gpg] http://debthin.org/debian bullseye main
      deb http://deb.debian.org/debian-security bullseye-security main

  # 3. Inject dpkg exclusions - apply to packages installed after debootstrap
  - path: /etc/dpkg/dpkg.cfg.d/01_nodoc
    generator: dump
    content: |-
      path-exclude /usr/share/doc/*
      path-include /usr/share/doc/*/copyright
      path-exclude /usr/share/man/*
      path-exclude /usr/share/groff/*
      path-exclude /usr/share/info/*
      path-exclude /usr/share/lintian/*

  - path: /etc/dpkg/dpkg.cfg.d/01_nolocale
    generator: dump
    content: |-
      path-exclude /usr/share/locale/*
      path-include /usr/share/locale/en/*

  - path: /etc/dpkg/dpkg.cfg.d/01_nobloat
    generator: dump
    content: |-
      path-exclude /usr/lib/x86_64-linux-gnu/gconv/*
      path-exclude /usr/lib/udev/hwdb.d/*
      path-exclude /usr/lib/systemd/hwdb/*
      path-exclude /etc/udev/hwdb.d/*

  # 4. apt config - no translations, compressed lists, no binary caches
  - path: /etc/apt/apt.conf.d/99thin
    generator: dump
    content: |-
      Acquire::Languages "none";
      Acquire::GzipIndexes "true";
      Acquire::CompressionTypes::Order:: "gz";
      Dir::Cache::pkgcache "";
      Dir::Cache::srcpkgcache "";

  - path: /etc/apt/apt.conf.d/01norecommends
    generator: dump
    content: |-
      APT::Install-Recommends "false";
      APT::Install-Suggests "false";

  # 5. Bullseye uses ifupdown networking (not systemd-networkd by default).
  #    dhclient writes /etc/resolv.conf directly, no thin-resolv needed.
  - path: /etc/network/interfaces
    generator: dump
    content: |-
      auto lo
      iface lo inet loopback

      allow-hotplug eth0
      iface eth0 inet dhcp

  - path: /etc/hostname
    generator: hostname

  - path: /etc/hosts
    generator: hosts

packages:
  manager: apt
  update: false
  cleanup: false

actions:
  - trigger: post-unpack
    action: |-
      #!/bin/sh
      set -e
      # Purge doc/man/locale installed by debootstrap before any further packages land
      rm -rf /usr/share/doc/* /usr/share/man/* /usr/share/locale/*
      rm -rf /usr/lib/x86_64-linux-gnu/gconv/* /usr/lib/udev/hwdb.d/*
      rm -f /usr/lib/udev/hwdb.bin /etc/udev/hwdb.bin

  - trigger: post-files
    action: |-
      #!/bin/sh
      set -e

      [ -f /.post-files-done ] && exit 0

      export DEBIAN_FRONTEND=noninteractive

      apt-get update
      apt-get install -y systemd systemd-sysv wget ifupdown isc-dhcp-client
      apt-get remove -y udev 2>/dev/null || true
      apt-get autoremove -y

      rm -rf /usr/share/doc/* /usr/share/man/* /usr/share/locale/*
      rm -f /var/cache/apt/*.bin
      rm -rf /var/lib/apt/lists/*


      mkdir -p /etc/systemd/journald.conf.d
      printf '[Journal]\nSystemMaxUse=50M\nSystemKeepFree=0\n' \
             > /etc/systemd/journald.conf.d/00-container-limits.conf

      touch /.post-files-done

targets:
  lxc:
    config:
      - type: all
        content: |-
          lxc.include = LXC_TEMPLATE_CONFIG/debian.common.conf
          lxc.arch = amd64
      - type: user
        content: |-
          lxc.include = LXC_TEMPLATE_CONFIG/debian.userns.conf
